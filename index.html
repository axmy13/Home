<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS. LEE | 数字实验室</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D1A75D; --bg: #0A0C10; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh;
        }
        /* 顶部装饰 */
        .header { margin-top: 80px; text-align: center; }
        .logo {
            width: 70px; height: 70px; border: 1px solid var(--gold);
            border-radius: 50%; margin-bottom: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 24px; color: var(--gold);
            box-shadow: 0 0 20px rgba(209, 167, 93, 0.2);
        }
        h1 { font-size: 1.2rem; letter-spacing: 5px; font-weight: 200; margin: 0; }
        p { color: #666; font-size: 0.8rem; margin-top: 10px; letter-spacing: 2px; }

        /* 按钮容器 */
        .links-container {
            width: 90%; max-width: 400px; margin-top: 50px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* 核心按钮：MY-ORACLE */
        .main-btn {
            text-decoration: none; position: relative;
            padding: 20px; border: 1px solid var(--gold);
            color: var(--gold); border-radius: 4px;
            overflow: hidden; transition: 0.4s;
            background: rgba(209, 167, 93, 0.05);
        }
        .main-btn:hover { background: var(--gold); color: black; }

        .btn-title { display: block; font-size: 1rem; letter-spacing: 3px; font-weight: 400; }
        .btn-subtitle { display: block; font-size: 0.7rem; opacity: 0.7; margin-top: 5px; }

        /* 其他社交按钮（扁平化风格） */
        .social-link {
            text-decoration: none; color: #999; font-size: 0.8rem;
            padding: 15px; border-radius: 4px; border: 1px solid #222;
            transition: 0.3s;
        }
        .social-link:hover { border-color: #444; color: white; }

        .footer { margin-top: auto; padding-bottom: 40px; font-size: 0.6rem; color: #333; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">L</div>
        <h1>MS. LEE</h1>
        <p>数字频率 · 赛博禅意 · 独立开发</p>
    </div>

    <div class="links-container">
        <a href="https://axmy13.github.io/my-oracle/" class="main-btn">
            <span class="btn-title">MY-ORACLE</span>
            <span class="btn-subtitle">开启此时此刻的能量感应</span>
        </a>

        <a href="#" class="social-link">小红书 | 关注我的实验室</a>
        <a href="#" class="social-link">YouTube | 视频频道</a>
        <a href="#" class="social-link">联系我 / 商务合作</a>
    </div>

    <div class="footer">POWERED BY MS. LEE DIGITAL LAB</div>

</body>
</html>
